# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Runs R CMD check on Ubuntu (release), macOS (release), and Windows (release).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,  r: 'release'}
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      # Download JDBC drivers so DatabaseConnector can connect in tests that
      # require a live database.  Live-DB tests skip themselves when CI=true,
      # but the drivers must be present for the package to load cleanly.
      - name: Download JDBC drivers
        shell: bash
        run: |
          mkdir -p "$HOME/jdbc"
          Rscript -e "DatabaseConnector::downloadJdbcDrivers('sql server', pathToDriver = Sys.getenv('HOME') |> file.path('jdbc'), method = 'auto')" || true

      - name: Set JDBC_DRIVER_PATH
        shell: bash
        run: echo "JDBC_DRIVER_PATH=$HOME/jdbc" >> "$GITHUB_ENV"

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual")'
